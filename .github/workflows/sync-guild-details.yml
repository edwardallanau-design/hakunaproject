name: Sync Guild Details

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger guild details sync
        run: |
          echo "Running guild details sync at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://hakunaproject.vercel.app/api/sync-guild-details)
          echo "Response status: $response"
          if [ "$response" != "200" ]; then
            echo "Sync failed with status $response"
            exit 1
          fi
          echo "Sync completed successfully"
